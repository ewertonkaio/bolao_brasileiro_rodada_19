<script type="text/babel">

const CFG = window.BOLAO_CONFIG || {};

function initSupabase() {
  try {
    if (!window.supabase) return null;
    const url = (CFG.SUPABASE_URL || '').trim();
    const key = (CFG.SUPABASE_ANON_KEY || '').trim();
    if (!url || !key) return null;
    // valida o formato da URL antes de passar ao cliente
    if (!/^https:\/\/.+\.supabase\.co\/?$/.test(url)) {
      console.warn('[bolão] SUPABASE_URL com formato inesperado:', url);
      // tenta validar como URL genérica; se falhar, aborta sem quebrar a página
      try { new URL(url); } catch (e) { return null; }
    }
    return window.supabase.createClient(url, key);
  } catch (e) {
    console.error('[bolão] Falha ao iniciar Supabase:', e);
    return null;
  }
}

// QR Code do Pix renderizado como SVG
function QR({ text }) {
  if (!text || typeof qrcode === 'undefined') return null;
  let svg = '';
  try {
    const qr = qrcode(0, 'M');
    qr.addData(text);
    qr.make();
    svg = qr.createSvgTag({ cellSize: 4, margin: 4, scalable: true });
  } catch (e) { return null; }
  return (
    <div className="qr-wrap" dangerouslySetInnerHTML={{ __html: svg }} />
  );
}

// ---- Pix BR Code (fallback caso o MP retorne só o texto copia-e-cola) ----
function crc16(str) {
  let crc = 0xFFFF;
  for (let i = 0; i < str.length; i++) {
    crc ^= str.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4, '0');
}
function tlv(id, val) {
  const len = val.length.toString().padStart(2, '0');
  return id + len + val;
}
function pixPayload(key, name, amount, city = 'SAO PAULO') {
  if (!key) return '';
  const gui = tlv('00', 'br.gov.bcb.pix');
  const k = tlv('01', key);
  const mai = tlv('26', gui + k);
  const nm = (name || 'RECEBEDOR').normalize('NFD').replace(/[\u0300-\u036f]/g, '').slice(0, 25).toUpperCase();
  const ct = city.normalize('NFD').replace(/[\u0300-\u036f]/g, '').slice(0, 15).toUpperCase();
  let p = tlv('00', '01')
    + mai
    + tlv('52', '0000')
    + tlv('53', '986')
    + (amount ? tlv('54', Number(amount).toFixed(2)) : '')
    + tlv('58', 'BR')
    + tlv('59', nm)
    + tlv('60', ct)
    + tlv('62', tlv('05', '***'));
  p += '6304';
  return p + crc16(p);
}

// outcome of a scoreline: 'H','A','D' or null
function outcome(h, a) {
  if (h === '' || a === '' || h == null || a == null) return null;
  const H = parseInt(h), A = parseInt(a);
  if (isNaN(H) || isNaN(A)) return null;
  if (H > A) return 'H';
  if (A > H) return 'A';
  return 'D';
}
// 3 = exact, 1 = right winner/draw, 0 = miss, null = no result yet
function pointsFor(guess, result) {
  const go = outcome(guess.h, guess.a), ro = outcome(result.h, result.a);
  if (ro == null) return null;
  if (go == null) return 0;
  if (parseInt(guess.h) === parseInt(result.h) && parseInt(guess.a) === parseInt(result.a)) return 3;
  if (go === ro) return 1;
  return 0;
}

function App() {
  const [name, setName] = useState('');
  const [nameInput, setNameInput] = useState('');
  const [tab, setTab] = useState('palpites');
  const [guesses, setGuesses] = useState({});
  const [results, setResults] = useState({});
  const [payments, setPayments] = useState({});
  const [pixMsg, setPixMsg] = useState('');
  const [pixData, setPixData] = useState(null);
  const [pixLoading, setPixLoading] = useState(false);
  const [checking, setChecking] = useState(false);
  const [myGuess, setMyGuess] = useState({});
  const [savedMsg, setSavedMsg] = useState('');
  const [loading, setLoading] = useState(true);
  const [pwInput, setPwInput] = useState('');
  const [resMsg, setResMsg] = useState('');

  const refresh = useCallback(async () => {
    const [g, r, p] = await Promise.all([loadGuesses(), loadResults(), loadPayments()]);
    setGuesses(g); setResults(r); setPayments(p); setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  // when a player is chosen, load their existing guess
  useEffect(() => {
    if (name && guesses[name]) setMyGuess(guesses[name]);
  }, [name, guesses]);

  // enquanto aguarda o pagamento, recarrega o status a cada 5s
  useEffect(() => {
    if (!checking) return;
    if (payments[name]) {
      setChecking(false);
      setPixMsg('Pagamento confirmado! Obrigado. ✅');
      setTimeout(() => setPixMsg(''), 4000);
      return;
    }
    const t = setInterval(async () => {
      const p = await loadPayments();
      setPayments(p);
    }, 5000);
    return () => clearInterval(t);
  }, [checking, payments, name]);

  const pickPlayer = (n) => {
    const clean = n.trim();
    if (!clean) return;
    setName(clean);
    setMyGuess(guesses[clean] || {});
  };

  const updateMy = (id, side, val) => {
    const v = val.replace(/[^0-9]/g, '').slice(0, 2);
    setMyGuess(prev => ({ ...prev, [id]: { ...(prev[id] || {h:'',a:''}), [side]: v } }));
  };

  const submit = async () => {
    try {
      await saveGuess(name, myGuess);
      setSavedMsg('Palpites salvos! Boa sorte. ⚽');
      await refresh();
      setTimeout(() => setSavedMsg(''), 3500);
    } catch (e) {
      setSavedMsg('Erro ao salvar — confira a conexão.');
      setTimeout(() => setSavedMsg(''), 4000);
    }
  };

  // edita só localmente; persistência acontece no botão "Salvar resultados"
  const updateResult = (id, side, val) => {
    const v = val.replace(/[^0-9]/g, '').slice(0, 2);
    setResults(prev => ({ ...prev, [id]: { ...(prev[id] || {h:'',a:''}), [side]: v } }));
  };

  const commitResults = async () => {
    if (!CONFIG_OK) { setResMsg('App ainda não conectado ao banco.'); return; }
    if (pwInput !== (CFG.RESULTS_PASSWORD || '')) {
      setResMsg('Senha incorreta.');
      setTimeout(() => setResMsg(''), 3000);
      return;
    }
    try {
      await saveResults(results);
      setResMsg('Resultados oficiais salvos! Ranking atualizado.');
      await refresh();
      setTimeout(() => setResMsg(''), 3500);
    } catch (e) {
      setResMsg('Erro ao salvar resultados.');
      setTimeout(() => setResMsg(''), 4000);
    }
  };

  const gerarPix = async () => {
    setPixLoading(true); setPixMsg('');
    try {
      const res = await fetch('/.netlify/functions/criar-pagamento', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ player: name }),
      });
      const data = await res.json();
      if (!res.ok) {
        setPixMsg(data.error || 'Não foi possível gerar a cobrança.');
      } else {
        setPixData(data);
        setChecking(true);
      }
    } catch (e) {
      setPixMsg('Erro de conexão ao gerar o Pix.');
    } finally {
      setPixLoading(false);
    }
  };

  const copyPix = async (payload) => {
    try {
      await navigator.clipboard.writeText(payload);
      setPixMsg('Código Pix copiado!');
      setTimeout(() => setPixMsg(''), 2500);
    } catch (e) {
      setPixMsg('Não consegui copiar — selecione manualmente.');
      setTimeout(() => setPixMsg(''), 3500);
    }
  };
  const board = Object.entries(guesses).map(([player, g]) => {
    let total = 0, exact = 0, scored = 0;
    MATCHES.forEach(m => {
      const guess = g[m.id], res = results[m.id];
      if (!guess || !res) return;
      const p = pointsFor(guess, res);
      if (p == null) return;
      scored++;
      total += p;
      if (p === 3) exact++;
    });
    return { player, total, exact, scored };
  }).sort((a, b) => b.total - a.total || b.exact - a.exact || a.player.localeCompare(b.player));

  const anyResults = MATCHES.some(m => outcome((results[m.id]||{}).h, (results[m.id]||{}).a) != null);
  const myComplete = MATCHES.every(m => {
    const g = myGuess[m.id];
    return g && g.h !== '' && g.a !== '' && g.h != null && g.a != null;
  });

  // ---------- NAME GATE ----------
  if (!name) {
    const existing = Object.keys(guesses);
    return (
      <div className="wrap">
        <div className="hero">
          <div className="eyebrow">Brasileirão 2026 · 19ª Rodada</div>
          <h1>Bolão<span>da Galera</span></h1>
          <div className="sub">A retomada pós-Copa. Crave os 10 placares, dispute com os amigos.</div>
        </div>
        <div className="gate">
          {!CONFIG_OK && (
            <div style={{marginBottom:16,padding:'10px 12px',borderRadius:8,
              background:'rgba(245,166,35,0.15)',border:'1px solid rgba(245,166,35,0.4)',
              color:'#f5a623',fontSize:12,lineHeight:1.5,textAlign:'center'}}>
              Banco de dados não conectado. Confira as variáveis de ambiente no Netlify.
            </div>
          )}
          <label htmlFor="nm">Seu nome</label>
          <input id="nm" value={nameInput} placeholder="Ex: Ewerton"
            onChange={e => setNameInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') pickPlayer(nameInput); }} />
          <div style={{marginTop:14, textAlign:'center'}}>
            <button className="btn-primary" onClick={() => pickPlayer(nameInput)}>Entrar</button>
          </div>
          {existing.length > 0 && (
            <div className="existing">
              <div className="existing-title">Já estão no bolão</div>
              {existing.map(n => <span key={n} className="chip" onClick={() => pickPlayer(n)}>{n}</span>)}
            </div>
          )}
        </div>
        <div className="footer-note">
          Todos jogam no mesmo link. Cada um entra com o próprio nome e seus palpites ficam salvos.
        </div>
      </div>
    );
  }

  // ---------- MAIN ----------
  return (
    <div className="wrap">
      <div className="hero" style={{paddingBottom: 22}}>
        <div className="eyebrow">Brasileirão 2026 · 19ª Rodada</div>
        <h1 style={{fontSize: 'clamp(32px,7vw,58px)'}}>Bolão<span>da Galera</span></h1>
      </div>

      <div className="tabs">
        <button className={'tab' + (tab==='palpites'?' active':'')} onClick={()=>setTab('palpites')}>Palpites</button>
        <button className={'tab' + (tab==='pagar'?' active':'')} onClick={()=>setTab('pagar')}>Pagar</button>
        <button className={'tab' + (tab==='ranking'?' active':'')} onClick={()=>setTab('ranking')}>Ranking</button>
        <button className={'tab' + (tab==='resultados'?' active':'')} onClick={()=>setTab('resultados')}>Resultados</button>
      </div>

      <div className="playerbar">
        <div className="who">Jogando como <b>{name}</b></div>
        <button onClick={() => { setName(''); setNameInput(''); setMyGuess({}); }}>Trocar jogador</button>
      </div>

      {loading && <div className="lb-empty">Carregando o bolão…</div>}

      {/* PALPITES */}
      {!loading && tab === 'palpites' && (
        <div>
          {MATCHES.map((m, i) => {
            const g = myGuess[m.id] || { h:'', a:'' };
            const res = results[m.id];
            const pts = res ? pointsFor(g, res) : null;
            let tag = null;
            if (pts === 3) tag = <div className="result-tag win">Cravou o placar! +3 pontos</div>;
            else if (pts === 1) tag = <div className="result-tag partial">Acertou o resultado · +1 ponto</div>;
            else if (pts === 0) tag = <div className="result-tag miss">Não foi dessa vez · 0 ponto</div>;
            return (
              <div className={'match' + (pts!=null?' locked':'')} key={m.id}>
                <div className="match-meta">
                  <span className="match-num">JOGO {i+1}</span>
                  <span className="match-date">{m.date}</span>
                </div>
                <div className="match-row">
                  <span className="team home"><span className="nm">{m.home}</span><Crest team={m.home} /></span>
                  <div className="score-input">
                    <input inputMode="numeric" value={g.h} onChange={e=>updateMy(m.id,'h',e.target.value)} aria-label={m.home + ' gols'} />
                    <span className="score-x">×</span>
                    <input inputMode="numeric" value={g.a} onChange={e=>updateMy(m.id,'a',e.target.value)} aria-label={m.away + ' gols'} />
                  </div>
                  <span className="team away"><Crest team={m.away} /><span className="nm">{m.away}</span></span>
                </div>
                {tag}
              </div>
            );
          })}
          <div className="save-bar">
            <button className="btn-primary" onClick={submit} disabled={!myComplete}>
              {myComplete ? 'Salvar meus palpites' : 'Preencha todos os 10 jogos'}
            </button>
            <div className="saved-note">{savedMsg}</div>
          </div>
        </div>
      )}

      {/* PAGAR */}
      {!loading && tab === 'pagar' && (() => {
        const fee = CFG.ENTRY_FEE || '10';
        const iPaid = payments[name];
        return (
          <div>
            <div className="pix-card">
              <div className="pix-amount">R$ {fee}</div>
              <div className="pix-label">Entrada do bolão · por jogador</div>
              {iPaid && <div className="pix-paid">Você já está pago ✅</div>}

              {!iPaid && !pixData && (
                <button className="btn-primary" style={{marginTop:18}}
                  onClick={gerarPix} disabled={pixLoading}>
                  {pixLoading ? 'Gerando cobrança…' : 'Gerar QR Code Pix'}
                </button>
              )}

              {!iPaid && pixData && (
                <div>
                  {pixData.qr_base64
                    ? <div className="qr-wrap"><img alt="QR Code Pix" src={'data:image/png;base64,' + pixData.qr_base64} /></div>
                    : <QR text={pixData.qr_code} />}
                  <div className="pix-key-box">
                    <div className="pix-key-title">Pix copia e cola</div>
                    <div className="pix-key-val">{pixData.qr_code}</div>
                  </div>
                  <button className="btn-ghost" onClick={()=>copyPix(pixData.qr_code)}>Copiar código Pix</button>
                  <div className="pix-to" style={{marginTop:16}}>
                    {checking ? 'Aguardando confirmação do pagamento…' : 'Pague pelo app do seu banco. A confirmação aparece sozinha.'}
                  </div>
                </div>
              )}
            </div>
            <div className="saved-note" style={{textAlign:'center'}}>{pixMsg}</div>
            <div className="pix-honor">
              O pagamento é processado pelo Mercado Pago. Assim que cair, você é marcado como pago
              automaticamente e aparece no ranking. 🤝
            </div>
          </div>
        );
      })()}

      {/* RANKING */}
      {!loading && tab === 'ranking' && (
        <div>
          {board.length === 0 && <div className="lb-empty">Ninguém palpitou ainda. Seja o primeiro!</div>}
          {board.map((row, i) => (
            <div className={'lb-row podium-' + (i+1)} key={row.player}>
              <div className="lb-rank">{i+1}º</div>
              <div>
                <div className="lb-name">
                  {row.player}{row.player===name ? ' (você)' : ''}
                  {payments[row.player]
                    ? <span className="pay-badge paid">pago</span>
                    : <span className="pay-badge due">pendente</span>}
                </div>
                <div className="lb-detail">{row.exact} placar{row.exact!==1?'es':''} cravado{row.exact!==1?'s':''} · {row.scored}/10 jogos apurados</div>
              </div>
              <div className="lb-pts"><b>{row.total}</b><span>PTS</span></div>
            </div>
          ))}
          {!anyResults && board.length > 0 && (
            <div className="footer-note">O ranking zera até os resultados oficiais serem lançados na aba “Resultados”.</div>
          )}
          <div className="scoring-key">
            Como pontua: <b>3 pontos</b> ao cravar o placar exato · <b>1 ponto</b> ao acertar só quem venceu (ou o empate) · <b>0</b> ao errar.
          </div>
        </div>
      )}

      {/* RESULTADOS */}
      {!loading && tab === 'resultados' && (
        <div>
          <div className="admin-note">
            Aqui se lança o <b style={{color:'var(--gold)'}}>placar oficial</b> de cada jogo. Digite os placares, informe a <b style={{color:'var(--gold)'}}>senha</b> e salve — o resultado vale para o ranking de todo mundo.
          </div>
          {MATCHES.map((m, i) => {
            const r = results[m.id] || { h:'', a:'' };
            return (
              <div className="match" key={m.id}>
                <div className="match-meta">
                  <span className="match-num">JOGO {i+1}</span>
                  <span className="match-date">{m.date}</span>
                </div>
                <div className="match-row">
                  <span className="team home"><span className="nm">{m.home}</span><Crest team={m.home} /></span>
                  <div className="score-input">
                    <input inputMode="numeric" value={r.h} onChange={e=>updateResult(m.id,'h',e.target.value)} aria-label={m.home + ' resultado'} />
                    <span className="score-x">×</span>
                    <input inputMode="numeric" value={r.a} onChange={e=>updateResult(m.id,'a',e.target.value)} aria-label={m.away + ' resultado'} />
                  </div>
                  <span className="team away"><Crest team={m.away} /><span className="nm">{m.away}</span></span>
                </div>
              </div>
            );
          })}
          <div className="save-bar">
            <input type="password" value={pwInput} placeholder="Senha dos resultados"
              onChange={e=>setPwInput(e.target.value)}
              style={{width:'100%',maxWidth:280,padding:'12px 14px',borderRadius:10,
                border:'1px solid var(--pitch-line)',background:'rgba(0,0,0,0.22)',
                color:'var(--chalk)',fontSize:15,fontFamily:'inherit',fontWeight:600,
                outline:'none',marginBottom:14,textAlign:'center'}} />
            <div>
              <button className="btn-primary" onClick={commitResults}>Salvar resultados</button>
            </div>
            <div className="saved-note">{resMsg}</div>
          </div>
        </div>
      )}

      <div className="footer-note">
        Datas e horários conforme tabela da CBF · sujeitos a alteração. Compartilhe este link com a galera.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
